<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Hero Section Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* New Hero Section with Full-Screen Video and Inverted Border */
        .new-hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Apply the inverted border mask to the entire section */
            mask: url('./src/assets/Subtract.png');
            mask-size: cover;
            mask-position: center;
            mask-repeat: no-repeat;
            -webkit-mask: url('./src/assets/Subtract.png');
            -webkit-mask-size: cover;
            -webkit-mask-position: center;
            -webkit-mask-repeat: no-repeat;
        }

        /* Full-screen video background */
        .new-hero-video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .new-hero-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .new-hero-video-fallback {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .new-hero-video-fallback img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        /* Video overlay for better text readability */
        .new-hero-video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                135deg,
                rgba(0, 0, 0, 0.6) 0%,
                rgba(0, 0, 0, 0.4) 50%,
                rgba(0, 0, 0, 0.7) 100%
            );
            z-index: 2;
        }

        /* Main content wrapper */
        .new-hero-content-wrapper {
            position: relative;
            z-index: 4;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .new-hero-container {
            max-width: 1280px;
            width: 100%;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            height: 100%;
        }

        /* Title section */
        .new-hero-title-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .new-hero-title {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.1;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin: 0;
            letter-spacing: -0.02em;
        }

        /* Search section */
        .new-hero-search-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2rem;
        }

        .new-hero-search-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 400px;
        }

        .new-hero-search-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1f2937;
            margin: 0 0 1rem 0;
        }

        .new-hero-search-box {
            display: flex;
            gap: 0.5rem;
            width: 100%;
        }

        .new-hero-search-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .new-hero-search-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .new-hero-search-button {
            padding: 0.75rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .new-hero-search-button:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }

        /* Department tags */
        .new-hero-departments {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .new-hero-department-tag {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            font-size: 0.875rem;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .new-hero-department-tag:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px -3px rgba(0, 0, 0, 0.2);
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .new-hero-container {
                grid-template-columns: 1fr;
                gap: 2rem;
                text-align: center;
                padding: 0 1.5rem;
            }
            
            .new-hero-title {
                font-size: 2.5rem;
            }
            
            .new-hero-search-container {
                max-width: 100%;
                margin: 0 auto;
            }
            
            .new-hero-departments {
                justify-content: center;
            }
        }

        @media (max-width: 768px) {
            .new-hero-container {
                padding: 0 1rem;
                gap: 1.5rem;
            }
            
            .new-hero-title {
                font-size: 2rem;
                line-height: 1.2;
            }
            
            .new-hero-search-container {
                padding: 1.5rem;
            }
            
            .new-hero-department-tag {
                font-size: 0.75rem;
                padding: 0.4rem 0.8rem;
            }
        }
    </style>
</head>
<body>
    <section class="new-hero-section">
        <!-- Full-screen video background -->
        <div class="new-hero-video-container">
            <video class="new-hero-video" autoplay muted loop playsinline>
                <!-- Using a medical/hospital stock video -->
                <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
                <!-- Fallback for browsers that don't support video -->
                <div class="new-hero-video-fallback">
                    <img src="https://images.unsplash.com/photo-1559757148-5c350d0d3c56?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80" alt="Medical facility background">
                </div>
            </video>
            
            <!-- Video overlay for better text readability -->
            <div class="new-hero-video-overlay"></div>
        </div>

        <!-- Main content -->
        <div class="new-hero-content-wrapper">
            <div class="new-hero-container">
                <!-- Main title -->
                <div class="new-hero-title-section">
                    <h1 class="new-hero-title">
                        Seventh-Day Adventist<br>
                        Medical Centre,<br>
                        Bangalore
                    </h1>
                </div>

                <!-- Search section -->
                <div class="new-hero-search-section">
                    <div class="new-hero-search-container">
                        <h2 class="new-hero-search-title">Search Our Doctors</h2>
                        <div class="new-hero-search-box">
                            <input type="text" placeholder="Find Doctor" class="new-hero-search-input">
                            <button class="new-hero-search-button">🔍</button>
                        </div>
                    </div>

                    <!-- Department tags -->
                    <div class="new-hero-departments">
                        <span class="new-hero-department-tag">Cardiologist</span>
                        <span class="new-hero-department-tag">Neurologist</span>
                        <span class="new-hero-department-tag">Dermatologist</span>
                        <span class="new-hero-department-tag">Pediatrics</span>
                        <span class="new-hero-department-tag">Dental Care</span>
                        <span class="new-hero-department-tag">Dental Care</span>
                        <span class="new-hero-department-tag">Dental Care</span>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
